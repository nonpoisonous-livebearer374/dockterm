name: Release

# Push a version tag (e.g. v0.1.0) to build installers for every OS and attach
# them to the matching GitHub Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, args: '--win --x64' }
          - { os: macos-14, args: '--mac --arm64' }
          - { os: macos-13, args: '--mac --x64' }
          - { os: ubuntu-latest, args: '--linux --x64' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build

      - name: Package and publish installer
        run: npx --no-install electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No code-signing certificates in V1 — produce unsigned artifacts.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
